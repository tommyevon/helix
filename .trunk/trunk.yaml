version: 0.1
cli:
  version: 1.22.2

plugins:
  sources:
    - id: trunk
      ref: v1.6.2
      uri: https://github.com/trunk-io/plugins

lint:
  enabled:
    - black@24.3.0
    - pylint@3.1.0
    - isort@5.13.2
    - ruff@0.4.1

actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
